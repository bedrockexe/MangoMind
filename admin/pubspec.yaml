name: sweet_insights_admin
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.1.1
  firebase_storage: ^13.0.3
  image_picker: ^1.2.0
  uuid: ^4.5.1
  cloud_firestore: ^6.0.2
  cloud_functions: ^6.0.2
  firebase_auth: ^6.1.0
  intl: ^0.20.2
  http: ^1.5.0
  google_fonts: ^6.3.2
  fl_chart: ^1.1.1
  table_calendar: ^3.2.0
  shared_preferences: ^2.5.3
  flutter_launcher_icons: ^0.14.4
  flutter_slidable: ^4.0.3
  animated_text_kit: ^4.3.0
  pdf: ^3.11.0
  printing: ^5.14.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/applogo.png

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/applogo.png"

