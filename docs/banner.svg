<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none" role="img" aria-label="Sweet Insights - Smart Mango Farming, powered by AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#052e16"/>
      <stop offset="0.55" stop-color="#14532d"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mango" cx="0.4" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.55" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#84cc16"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- decorative bokeh -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="300" r="90"/>
    <circle cx="980" cy="60" r="60"/>
    <circle cx="1180" cy="300" r="120"/>
    <circle cx="60" cy="60" r="40"/>
  </g>

  <!-- dotted texture -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="820" cy="120" r="3"/><circle cx="860" cy="150" r="3"/><circle cx="900" cy="110" r="3"/>
    <circle cx="840" cy="190" r="3"/><circle cx="880" cy="220" r="3"/><circle cx="800" cy="250" r="3"/>
  </g>

  <!-- ===== Mango illustration (right) ===== -->
  <g transform="translate(1045 185)">
    <!-- soft shadow -->
    <ellipse cx="6" cy="118" rx="92" ry="20" fill="#000000" opacity="0.18"/>
    <!-- fruit -->
    <g transform="rotate(-22)">
      <ellipse cx="0" cy="0" rx="98" ry="120" fill="url(#mango)"/>
      <!-- highlight -->
      <ellipse cx="-34" cy="-44" rx="26" ry="34" fill="#fffbeb" opacity="0.55"/>
      <!-- blush -->
      <ellipse cx="40" cy="40" rx="46" ry="60" fill="#ea580c" opacity="0.30"/>
    </g>
    <!-- stem -->
    <path d="M -8 -118 q 6 -22 26 -30" stroke="#7c2d12" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- leaf -->
    <g transform="translate(20 -150) rotate(28)">
      <path d="M 0 0 C 36 -18 86 -10 110 22 C 78 30 30 30 0 0 Z" fill="url(#leaf)"/>
      <path d="M 6 4 C 40 6 74 14 104 22" stroke="#bbf7d0" stroke-width="3" fill="none" opacity="0.8"/>
    </g>
  </g>

  <!-- ===== Text (left) ===== -->
  <text x="80" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="6" fill="#fcd34d">SMART AGRICULTURE PLATFORM</text>

  <text x="78" y="172" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="80" font-weight="800" fill="#ffffff">Sweet Insights</text>

  <text x="80" y="218" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="29" font-weight="500" fill="#bbf7d0">Smart Mango Farming, powered by AI 🥭</text>

  <!-- feature pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#ecfdf5">
    <g>
      <rect x="80" y="250" width="210" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="185" y="275" text-anchor="middle">AI Disease Detection</text>
    </g>
    <g>
      <rect x="302" y="250" width="150" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="377" y="275" text-anchor="middle">Farm Records</text>
    </g>
    <g>
      <rect x="464" y="250" width="216" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="572" y="275" text-anchor="middle">Weather-Smart Irrigation</text>
    </g>
    <g>
      <rect x="692" y="250" width="118" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="751" y="275" text-anchor="middle">Trainings</text>
    </g>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="352" width="1280" height="8" fill="url(#accent)"/>
</svg>
