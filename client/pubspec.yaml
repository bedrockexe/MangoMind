name: insights
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  # firebase essentials
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  cloud_functions: ^6.0.3

  # Fonts and icons
  google_fonts: ^6.3.0
  cupertino_icons: ^1.0.8
  
  # File Management
  image_picker: ^1.2.0
  image: ^4.2.0
  pdf: ^3.11.0
  file_saver: ^0.3.1
  file_selector_android: ^0.5.1+16
  file_selector: ^1.0.3
  media_store_plus: ^0.1.3
  flutter_file_dialog: ^3.0.2

  # External API
  http: ^1.5.0
  geolocator: ^14.0.2
  intl: ^0.20.0
  html: ^0.15.4

  # State Management
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  subscription_holder: ^2.2.0

  # UI Enhancements
  fl_chart: ^1.1.0
  table_calendar: ^3.2.0
  tflite_flutter: ^0.11.0
  
  # Utilities
  device_info_plus: ^12.1.0
  path_provider: ^2.1.5
  printing: ^5.14.2
  flutter_local_notifications: ^18.0.1
  flutter_native_timezone_latest: ^1.0.0
  camera: ^0.10.0
  add_2_calendar: ^3.0.1
  flutter_animate: ^4.0.0
  shimmer: ^3.0.0
  geocoding: ^4.0.0
  google_generative_ai: ^0.4.7
  file_picker: ^10.3.3
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon.png"
